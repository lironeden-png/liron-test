      #           | ($r.locations // [null])[] as $loc
      #           | $r
      #           | (if $loc == null then .locations = [] else .locations = [$loc] end)
      #           | (if $loc != null
      #                then .partialFingerprints = ((.partialFingerprints // {}) + {
      #                       primaryLocationLineHash: (
      #                         (($r.ruleId // "") | tostring) + "|"
      #                         + (($loc.physicalLocation.artifactLocation.uri // "") | tostring) + "|"
      #                         + (($loc.physicalLocation.region.startLine // 0) | tostring) + ":"
      #                         + (($loc.physicalLocation.region.startColumn // 0) | tostring)
      #                       )
      #                     })
      #                else . end)
      #           | (if ($r.ruleId != null and $ruleIndex[$r.ruleId] != null)
      #                then .ruleIndex = $ruleIndex[$r.ruleId]
      #                else . end)
      #         ]
      #     )
      #     ' results.sarif > results.tmp.sarif && mv results.tmp.sarif results.sarif
      - name: Display file content
        run: cat results.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tmp/results.sarif

